<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formuário</title>
    <link rel="icon" href="icone.png" type="image/png">
</head>
<body>

    <form>
    <h1>TIPOS DE INPUT FORMULÁRIO</h1><br>
    <fieldset>
        <legend>Dados de login</legend>
    <input type="text" name="entradatexto" id="entradatexto" placeholder="insira um texto"><br><br>
    <input type="password" name="senha" id="senha" placeholder="insira uma senha"><br><br>
    </fieldset><br><br>

    <input type="button" value="confirmar"><br><br>

    <input type="checkbox" id="cor1" name="cor1" value="Branco">
    <label for="co1">Branco</label><br>
    <input type="checkbox" id="cor2" name="cor1" value="Azul">
    <label for="co1">Azul</label><br>
    <input type="checkbox" id="cor3" name="cor1" value="Amarelo">
    <label for="co1">Amarelo</label><br><br>

    <input type="color" name="selectcor" id="selectcor">
    <label for="selectcor">selecione uma cor</label><br><br>

    <input type="date" name="data" id="data">
    <label for="data">Data</label><br><br>

    <input type="time" name="hora" id="hora">
    <label for="hora">informe o horário:</label><br><br>

    <input type="email" name="email" id="email" placeholder="Digite seu e-mail:"><br><br>

    <input type="number" name="numero" id="numero" placeholder="Digite seu número:"><br><br>

    <input type="file" name="arquivo" id="arquivo">
    <label for="arquivo">Selecione um arquivo</label><br><br>

    <input type="url" name="url" id="url" placeholder="Insira o Endereço"><br><br>

    <input type="week" name="semana" id="semana">
    <label for="semana">Selecione a semana</label><br><br>
 
    <input type="month" name="mes" id="mes">
    <label for="mes">Selecione o mês</label><br><br>

    <h4>Selecione uma linguagem favorita:</h4>

    <input type="radio" name="select" id="select" value="HTML">
    <label for="select">HTML</label><br>
    <input type="radio" name="select" id="select" value="CSS">
    <label for="select">CSS</label><br>
    <input type="radio" name="select" id="select" value="JAVASCRIPT">
    <label for="select">JAVASCRIPT</label><br>

    <label for="volume">Volume</label>
    <input type="range" name="volume" id="volume" min="0" max="100"><br><br>

    <label for="busca">Pesquisa</label>
    <input type="search" id="busca" name="busca"><br><br>

    <label for="fone">Digite seu numero:</label>
    <input type="tel" id="fone" name="fone" pattern="[0-9]{2}-[0-9]{9}" placeholder="00-000000000" required><br><br>

    <label for="reset">Apagar campos</label>
    <input type="reset" name="reset" id="reset" value="limpar"><br><br>

    <label for="enviar">Enviar informações</label>
    <input type="submit" name="enviar" id="enviar" value="Enviar"><br><br>

    <label for="estados">Selecione um Estado:</label>
    <select name="estados" id="estados">
        <option value="BA">BA</option>
        <option value="MG">MG</option>
        <option value="SP">SP</option>
        <option value="DF">DF</option>
    </select><br><br>

    <label for="mensagem">sua msg</label>
    <textarea name="mensagem" id="mensagem" rows="5" cols="30">digite sua mensagem</textarea>
    </form>

</body>
</html>
