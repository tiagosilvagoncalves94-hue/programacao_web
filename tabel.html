<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tabelas</title>
</head>
<body>
	<table style="border: 1px solid black;
		border-collapse: collapse; width: 50%;">
		<tr>
			<th style="border: 1px solid black;
			padding: 8px;">Nome</th>
			<th style="border: 1px solid black;
			padding: 8px;">valor</th>
			<th style="border: 1px solid black;
			padding: 8px;">quantidade</th>
		</tr>
		<tr>
			<td style="border: 1px solid black;
			padding: 8px;">balão</td>
			<td style="border: 1px solid black;
			padding: 8px;">25,0</td>
			<td style="border: 1px solid black;
			padding: 8px;">10</td>
		</tr>
		<tr>
			<td style="border: 1px solid black;
			padding: 8px;">pipoca</td>
			<td style="border: 1px solid black;
			padding: 8px;">15,0</td>
			<td style="border: 1px solid black;
			padding: 8px;">400g</td>
		</tr>
	</table>



</body>
</html>
